    <style>
        /* Variáveis de cores para facilitar a mudança depois, se quiser */
        :root {
            --primaria: #004a99;
            --fundo: #f0f2f5;
            --cartao: #ffffff;
            --texto-principal: #333333;
            --texto-secundario: #666666;
            --borda: #e4e6eb;
            --hover-linha: #f8f9fa;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--fundo); 
            color: var(--texto-principal);
            padding: 20px; 
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .container { 
            width: 100%;
            max-width: 900px; 
            background: var(--cartao); 
            padding: 40px 30px; 
            border-radius: 16px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.08); 
        }

        h2 { 
            color: var(--primaria); 
            text-align: center; 
            margin: 0 0 5px 0;
            font-size: 26px;
        }

        p.subtitle {
            text-align: center;
            color: var(--texto-secundario);
            margin-bottom: 30px;
            font-size: 15px;
        }

        .controls { 
            display: flex; 
            justify-content: center; 
            margin-bottom: 30px; 
        }

        /* Estilização moderna para o seletor de turmas */
        select { 
            padding: 14px 20px; 
            font-size: 16px; 
            font-weight: 500;
            color: var(--texto-principal);
            border-radius: 8px; 
            border: 2px solid var(--borda); 
            outline: none;
            width: 100%;
            max-width: 400px;
            cursor: pointer;
            transition: all 0.3s ease;
            appearance: none;
            background-color: #fff;
            /* Ícone de setinha personalizado */
            background-image: url('data:image/svg+xml;utf8,<svg fill="%23333" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
            background-repeat: no-repeat;
            background-position: right 15px center;
        }

        select:focus {
            border-color: var(--primaria);
            box-shadow: 0 0 0 3px rgba(0, 74, 153, 0.1);
        }

        /* Estilização da tabela */
        .table-wrapper {
            overflow-x: auto;
            border: 1px solid var(--borda);
            border-radius: 10px;
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            text-align: left; 
        }

        th, td { 
            padding: 16px 20px; 
            border-bottom: 1px solid var(--borda); 
        }

        th { 
            background-color: var(--primaria); 
            color: white; 
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr {
            transition: background-color 0.2s;
        }

        tr:hover { 
            background-color: var(--hover-linha); 
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--texto-secundario);
            font-style: italic;
        }

        .footer { 
            text-align: center; 
            margin-top: 40px; 
            font-size: 14px; 
            color: #999; 
            padding-top: 20px; 
            border-top: 1px solid var(--borda); 
        }

        /* Ajustes para celular */
        @media (max-width: 600px) {
            .container { padding: 20px 15px; }
            th, td { padding: 12px 10px; font-size: 14px; }
            h2 { font-size: 22px; }
        }
    </style>
</head>

    function carregarAlunos() {
        const turma = document.getElementById('turmaSelect').value;
        const lista = document.getElementById('listaAlunos');
        lista.innerHTML = ""; // Limpa a tabela para a nova turma

        const alunosDaTurma = bancoDeDados[turma] || [];
        
        if (alunosDaTurma.length === 0) {
            lista.innerHTML = "<tr><td colspan='2' class='empty-state'>Nenhum aluno cadastrado nesta turma.</td></tr>";
            return;
        }

        // Ordena a lista em ordem alfabética sempre que for exibida
        alunosDaTurma.sort((a, b) => a.nome.localeCompare(b.nome));

        alunosDaTurma.forEach(aluno => {
            lista.innerHTML += `<tr>
                <td>${aluno.nome}</td>
                <td>${aluno.email}</td>
            </tr>`;
        });
    }

    // Carrega a turma 1A logo que a página abre
    window.onload = carregarAlunos;
</script>
